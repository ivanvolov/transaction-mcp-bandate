<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger + Safe — Propose 1 USDC Transfer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 560px; width: 100%; padding: 32px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .subtitle { color: #8b949e; margin-bottom: 24px; font-size: 0.9rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 1rem; margin-bottom: 12px; color: #58a6ff; }
    .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85rem; border-bottom: 1px solid #21262d; }
    .info-row:last-child { border-bottom: none; }
    .label { color: #8b949e; }
    .value { color: #e6edf3; font-family: monospace; font-size: 0.8rem; word-break: break-all; text-align: right; max-width: 320px; }
    button { background: #238636; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 0.95rem; cursor: pointer; width: 100%; margin-top: 8px; }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    button.secondary { background: #30363d; }
    button.secondary:hover { background: #3d444d; }
    #log { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-top: 16px; font-family: monospace; font-size: 0.8rem; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: #8b949e; }
    .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
    .status.disconnected { background: #f85149; }
    .status.connected { background: #3fb950; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ledger + Safe Integration</h1>
    <p class="subtitle">Propose a 1 USDC transfer to zero address via Safe multisig, signed with Ledger</p>

    <div class="card">
      <h2><span class="status disconnected" id="statusDot"></span>Ledger Connection</h2>
      <button id="btnConnect" class="secondary">Connect Ledger</button>
      <div id="accountInfo" style="display:none; margin-top: 12px;">
        <div class="info-row">
          <span class="label">Account</span>
          <span class="value" id="account">—</span>
        </div>
        <div class="info-row">
          <span class="label">Chain ID</span>
          <span class="value" id="chainId">—</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Transaction Details</h2>
      <div class="info-row">
        <span class="label">Safe</span>
        <span class="value" id="safeAddr">—</span>
      </div>
      <div class="info-row">
        <span class="label">Action</span>
        <span class="value">Transfer 1 USDC</span>
      </div>
      <div class="info-row">
        <span class="label">To</span>
        <span class="value">0x0000…0000</span>
      </div>
      <div class="info-row">
        <span class="label">USDC Contract</span>
        <span class="value" id="usdcAddr">—</span>
      </div>
    </div>

    <button id="btnPropose" disabled>Propose & Sign with Ledger</button>

    <div id="log"></div>
  </div>

  <script type="module" src="/src/app.mjs"></script>
</body>
</html>
